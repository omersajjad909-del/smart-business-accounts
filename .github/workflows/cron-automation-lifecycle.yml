name: Cron — Automation Lifecycle

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger automation-lifecycle cron
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/automation-lifecycle")
          cat /tmp/resp.json
          if [ "$STATUS" != "200" ]; then
            echo "Cron failed with HTTP $STATUS"
            exit 1
          fi
