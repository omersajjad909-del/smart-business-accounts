name: Cron — SMS Invoice Reminder

on:
  schedule:
    - cron: "0 10 * * *"   # daily at 10:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sms-reminder cron
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sms-reminder")
          cat /tmp/resp.json
          if [ "$STATUS" != "200" ]; then
            echo "Cron failed with HTTP $STATUS"
            exit 1
          fi
