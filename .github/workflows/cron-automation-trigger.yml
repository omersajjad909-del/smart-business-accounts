name: Cron — Automation Lifecycle Trigger

on:
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger automation-lifecycle-trigger cron
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/automation-lifecycle-trigger")
          cat /tmp/resp.json
          if [ "$STATUS" != "200" ]; then
            echo "Cron failed with HTTP $STATUS"
            exit 1
          fi
