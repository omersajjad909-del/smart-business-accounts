<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Rounded background pill so icon is visible on any tab colour -->
  <rect width="32" height="32" rx="7" fill="#0d0f2b"/>

  <!-- 3 stacked bold chevron layers -->
  <!-- Bottom -->
  <path d="M4,24 L16,28.5 L28,24 L16,26.5 Z" fill="url(#g3)"/>
  <!-- Middle -->
  <path d="M3,19.5 L16,24.5 L29,19.5 L16,22 Z" fill="url(#g2)"/>
  <!-- Top — brightest -->
  <path d="M2,15 L16,20.5 L30,15 L16,17.5 Z" fill="url(#g1)"/>

  <!-- Upward arrow — bold & visible at small size -->
  <line x1="19" y1="12" x2="25" y2="5" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
  <polygon points="25,5 20.5,7.5 23.5,11" fill="#38bdf8"/>

  <!-- Single node dot -->
  <circle cx="13" cy="11" r="2" fill="#38bdf8"/>
</svg>
