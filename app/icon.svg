<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="55%"  stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4f8ef7" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="ga" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bottom layer -->
  <path d="M4,25 L16,28 L28,25 L16,27 Z" fill="url(#g3)"/>
  <!-- Mid layer -->
  <path d="M3,21 L16,24.5 L29,21 L16,23 Z" fill="url(#g2)"/>
  <!-- Top layer -->
  <path d="M2,17 L16,21 L30,17 L16,19.5 Z" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Network lines -->
  <line x1="9"  y1="13" x2="13" y2="10.5" stroke="url(#ga)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="13" y1="10.5" x2="18" y2="12" stroke="url(#ga)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="18" y1="12"   x2="22" y2="9"  stroke="url(#ga)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="9"  cy="13"   r="1.8" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="13" cy="10.5" r="1.8" fill="#5b87f5" filter="url(#glow)"/>
  <circle cx="18" cy="12"   r="1.8" fill="#7c6cf0" filter="url(#glow)"/>

  <!-- Arrow -->
  <line x1="20" y1="8.5" x2="25" y2="3.5" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="25,3.5 21,5 23.5,8" fill="#38bdf8" filter="url(#glow)"/>
</svg>
