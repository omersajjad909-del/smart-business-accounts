<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="16" rx="8" fill="rgba(255,255,255,0.07)"/>
  <!-- 3 ascending bars -->
  <rect x="5"  y="22" width="5" height="5"  rx="1.2" fill="rgba(255,255,255,0.5)"/>
  <rect x="13" y="17" width="5" height="10" rx="1.2" fill="rgba(255,255,255,0.72)"/>
  <rect x="21" y="11" width="5" height="16" rx="1.2" fill="white"/>
  <!-- Trend line -->
  <polyline points="7.5,22  15.5,17  23.5,11" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow tip -->
  <polyline points="21.5,9.8  23.5,11  22,13" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
