<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" fill="#070b18"/>
  <!-- Layers -->
  <path d="M2,25 L16,30 L30,25 L16,27.5 Z" fill="url(#lg3)"/>
  <path d="M1,19 L16,24.5 L31,19 L16,22 Z" fill="url(#lg2)"/>
  <path d="M0,13 L16,19 L32,13 L16,16.5 Z" fill="url(#lg)" filter="url(#glow)"/>
  <!-- Lines -->
  <line x1="7"  y1="10" x2="11" y2="7"  stroke="#38bdf8" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="11" y1="7"  x2="17" y2="9"  stroke="#6366f1" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="17" y1="9"  x2="22" y2="5"  stroke="#7c3aed" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="7"  cy="10" r="1.8" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="11" cy="7"  r="1.8" fill="#5b87f5" filter="url(#glow)"/>
  <circle cx="17" cy="9"  r="1.8" fill="#7c6cf0" filter="url(#glow)"/>
  <!-- Arrow -->
  <line x1="19" y1="7" x2="25" y2="2" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="25,2 20,4 23,8" fill="#38bdf8" filter="url(#glow)"/>
</svg>
