<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.35)"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.78)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.55)"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.8)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect width="40" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>

  <!-- Ascending bar chart: 3 bars -->
  <rect x="7"  y="27" width="6.5" height="6"  rx="1.5" fill="url(#bar1)"/>
  <rect x="17" y="21" width="6.5" height="12" rx="1.5" fill="url(#bar2)"/>
  <rect x="27" y="14" width="6.5" height="19" rx="1.5" fill="url(#bar3)"/>

  <!-- Trend line connecting bar tops -->
  <polyline
    points="10.25,27  20.25,21  30.25,14"
    fill="none"
    stroke="rgba(255,255,255,0.45)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow head at trend line end -->
  <polyline
    points="27.5,12.5  30.25,14  28,16.5"
    fill="none"
    stroke="rgba(255,255,255,0.55)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Small dot highlights on bar tops -->
  <circle cx="10.25" cy="27"  r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="20.25" cy="21"  r="1.5" fill="rgba(255,255,255,0.75)"/>
  <circle cx="30.25" cy="14"  r="1.5" fill="white" filter="url(#glow)"/>
</svg>
