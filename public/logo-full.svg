<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 40" width="168" height="40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.35)"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.78)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.55)"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.8)"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.9)"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark (40x40) ── -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <rect width="40" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>

  <!-- Ascending bars -->
  <rect x="7"  y="27" width="6.5" height="6"  rx="1.5" fill="url(#bar1)"/>
  <rect x="17" y="21" width="6.5" height="12" rx="1.5" fill="url(#bar2)"/>
  <rect x="27" y="14" width="6.5" height="19" rx="1.5" fill="url(#bar3)"/>

  <!-- Trend line -->
  <polyline points="10.25,27  20.25,21  30.25,14" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="27.5,12.5  30.25,14  28,16.5" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot highlights -->
  <circle cx="10.25" cy="27" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="20.25" cy="21" r="1.5" fill="rgba(255,255,255,0.75)"/>
  <circle cx="30.25" cy="14" r="1.5" fill="white"/>

  <!-- ── Wordmark ── -->
  <!-- "Finova" bold white -->
  <text
    x="50" y="26"
    font-family="'Outfit', 'Inter', system-ui, sans-serif"
    font-size="18"
    font-weight="800"
    letter-spacing="-0.3"
    fill="url(#textGrad)"
  >Finova</text>

  <!-- "OS" lighter with accent colour -->
  <text
    x="120" y="26"
    font-family="'Outfit', 'Inter', system-ui, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="-0.2"
    fill="rgba(165,180,252,0.85)"
  >OS</text>

  <!-- Thin separator line -->
  <line x1="115" y1="12" x2="115" y2="28" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Tagline (optional — remove if too small in navbar) -->
  <text
    x="50" y="35"
    font-family="'Outfit', 'Inter', system-ui, sans-serif"
    font-size="8.5"
    font-weight="500"
    letter-spacing="0.06em"
    fill="rgba(255,255,255,0.3)"
    text-transform="uppercase"
  >BUSINESS SUITE</text>
</svg>
