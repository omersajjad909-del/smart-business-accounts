<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="layerGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.92)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon area (80x80) -->
  <!-- Layer 3 bottom -->
  <path d="M8,62 L44,72 L80,62 L44,68 Z" fill="url(#layerGrad3)"/>
  <!-- Layer 2 middle -->
  <path d="M5,50 L44,62 L83,50 L44,57 Z" fill="url(#layerGrad2)"/>
  <!-- Layer 1 top -->
  <path d="M2,38 L44,52 L86,38 L44,45 Z" fill="url(#layerGrad)" filter="url(#glow)"/>

  <!-- Network graph lines -->
  <line x1="20" y1="32" x2="34" y2="24" stroke="url(#arrowGrad)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="34" y1="24" x2="50" y2="29" stroke="url(#arrowGrad)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="29" x2="62" y2="20" stroke="url(#arrowGrad)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="20" cy="32" r="3.5" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="34" cy="24" r="3.5" fill="#5b87f5" filter="url(#glow)"/>
  <circle cx="50" cy="29" r="3.5" fill="#7c6cf0" filter="url(#glow)"/>

  <!-- Arrow -->
  <line x1="55" y1="23" x2="70" y2="9" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" filter="url(#softglow)"/>
  <polygon points="70,9 60,12 67,20" fill="#38bdf8" filter="url(#softglow)"/>

  <!-- Wordmark -->
  <!-- "Finova" -->
  <text x="100" y="46"
    font-family="'Outfit','Inter',system-ui,sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="-0.5"
    fill="url(#textGrad)">Finova</text>

  <!-- separator -->
  <line x1="218" y1="20" x2="218" y2="56" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

  <!-- "OS" -->
  <text x="226" y="46"
    font-family="'Outfit','Inter',system-ui,sans-serif"
    font-size="28"
    font-weight="300"
    letter-spacing="-0.3"
    fill="rgba(165,180,252,0.8)">OS</text>

  <!-- tagline -->
  <text x="100" y="62"
    font-family="'Outfit','Inter',system-ui,sans-serif"
    font-size="9"
    font-weight="500"
    letter-spacing="0.18em"
    fill="rgba(255,255,255,0.28)">BUSINESS SUITE</text>
</svg>
